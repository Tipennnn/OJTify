<div class="login-wrapper">

    <!-- LEFT PANEL -->
    <div class="login-left">

        <div class="bg-pattern"></div>

        <div class="login-left-content">

            <!-- MOBILE LOGO -->
            <div class="logo-mobile">
                <img src="/assets/images/OJTify_logo.png">
            </div>

            <!-- BRAND -->
            <div class="brand hide-mobile">
                <img src="/assets/images/OJTify_logo.png">
                <span>OJTIFY</span>
            </div>

            <!-- WELCOME -->
            <div class="welcome-text hide-mobile">
                <h1>Create your OJTIFY Account</h1>
                <p>
                    Register to access the OJTIFY system and manage your internship attendance, records, and monitoring.
                </p>
            </div>

            <!-- SYSTEM INFO -->
            <div class="system-info hide-mobile">
                <span>OJTIFY System v1.0</span>
                <span>OJT Management System with QR Attendance</span>
            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="login-right">

        <div class="login-card">

            <h2>Student Registration</h2>

            <form>

                <!-- FIRST NAME -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-user"></i></span>
                        <input type="text" required>
                        <label>First Name</label>
                    </div>
                </div>

                <!-- MIDDLE NAME -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-user"></i></span>
                        <input type="text">
                        <label>Middle Name</label>
                    </div>
                </div>

                <!-- LAST NAME -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-user"></i></span>
                        <input type="text" required>
                        <label>Last Name</label>
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-envelope"></i></span>
                        <input type="email" required>
                        <label>Email</label>
                    </div>
                </div>

                <!-- CONTACT NUMBER -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-phone"></i></span>
                        <input type="tel" required>
                        <label>Contact Number</label>
                    </div>
                </div>

                <!-- STUDENT ID -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-id-card"></i></span>
                        <input type="text" required>
                        <label>Student ID</label>
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="icon"><i class="fa fa-lock"></i></span>
                        <input type="password" required>
                        <label>Password</label>
                        <span class="show-pass"><i class="fa fa-eye"></i></span>
                    </div>
                </div>

                <button class="login-btn">
                    Create Account
                </button>

                <p class="signup-link">
                    Already have an account?
                    <a routerLink="/intern-login">Log in</a>
                  </p>
                  
                <p class="system-mobile">
                    OJT Management System with QR Attendance
                </p>

            </form>

        </div>

    </div>

</div>
