<header class="topnav">

  <div class="topnav-left">
    <span class="greeting">{{ greeting }}</span>
  </div>

  <div class="topnav-right">

    <div class="profile" (click)="toggleMenu()">
      <img [src]="profilePhotoUrl" alt="Profile Picture"
           style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
    </div>

    <div class="dropdown" *ngIf="menuOpen">
      <div class="dropdown-item" (click)="goProfile()">
        <i class="fa-solid fa-user"></i> Profile
      </div>
      <div class="dropdown-item" (click)="openChangePassword()">
        <i class="fa-solid fa-lock"></i> Change Password
      </div>
    </div>

  </div>

</header>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" *ngIf="showPasswordModal">
  <div class="password-modal">

    <div class="modal-header">
      <h2><i class="fa-solid fa-lock"></i> Change Password</h2>
      <i class="fa-solid fa-xmark close-icon" (click)="closeModal()"></i>
    </div>

    <p class="note">Password must be at least 8 characters long.</p>
    <div class="modal-divider"></div>

    <!-- CURRENT PASSWORD -->
    <div class="input-group">
      <label>Current Password</label>
      <div class="password-field">
        <input [type]="showCurrent ? 'text' : 'password'"
               [(ngModel)]="currentPassword"
               placeholder="Enter current password">
        <i class="fa-solid"
           [ngClass]="showCurrent ? 'fa-eye-slash' : 'fa-eye'"
           (click)="showCurrent = !showCurrent"></i>
      </div>
    </div>

    <!-- NEW PASSWORD -->
    <div class="input-group">
      <label>New Password</label>
      <div class="password-field">
        <input [type]="showNew ? 'text' : 'password'"
               [(ngModel)]="newPassword"
               placeholder="Create new password">
        <i class="fa-solid"
           [ngClass]="showNew ? 'fa-eye-slash' : 'fa-eye'"
           (click)="showNew = !showNew"></i>
      </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group">
      <label>Confirm New Password</label>
      <div class="password-field">
        <input [type]="showConfirm ? 'text' : 'password'"
               [(ngModel)]="confirmPassword"
               placeholder="Confirm new password">
        <i class="fa-solid"
           [ngClass]="showConfirm ? 'fa-eye-slash' : 'fa-eye'"
           (click)="showConfirm = !showConfirm"></i>
      </div>
    </div>

    <div class="modal-actions">
      <button class="save-btn" (click)="updatePassword()" [disabled]="passwordLoading">
        <i class="fa fa-spinner fa-spin" *ngIf="passwordLoading"></i>
        {{ passwordLoading ? 'Updating...' : 'Update Password' }}
      </button>
    </div>

  </div>
</div>
