<div class="login-wrapper">

  <!-- LEFT PANEL -->
  <div class="login-left">
    <div class="bg-pattern"></div>
    <div class="login-left-content">

      <div class="logo-mobile">
        <img src="/assets/images/OJTify_logo.png">
      </div>

      <div class="brand hide-mobile">
        <img src="/assets/images/OJTify_logo.png">
        <span>OJTIFY</span>
      </div>

      <div class="welcome-text hide-mobile">
        <h1>Welcome back, Admin</h1>
        <p>
          Efficiently manage interns, track attendance, assign tasks,
          and monitor system operations from a centralized admin dashboard.
        </p>
      </div>

      <div class="system-info hide-mobile">
        <span>OJTIFY Admin System v1.0</span>
        <span>Management & Monitoring Dashboard</span>
      </div>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="login-right">
    <div class="login-card">

      <h2>Admin Portal</h2>

      <!-- Error banner -->
      <div class="alert-error" *ngIf="errorMessage">
        <i class="fa fa-circle-exclamation"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="onLogin()">

        <!-- EMAIL -->
        <div class="input-group">
          <div class="input-wrapper">
            <span class="icon"><i class="fa fa-user-shield"></i></span>
            <input type="email" [(ngModel)]="email" name="email" required>
            <label>Admin Email</label>
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
          <div class="input-wrapper">
            <span class="icon"><i class="fa fa-lock"></i></span>
            <input [type]="showPassword ? 'text' : 'password'"
                   [(ngModel)]="password" name="password" required>
            <label>Password</label>
            <span class="show-pass" (click)="togglePassword()">
              <i [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
            </span>
          </div>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
            Remember me
          </label>
          <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" type="submit" [disabled]="loading">
          <i class="fa fa-spinner fa-spin" *ngIf="loading"></i>
          {{ loading ? 'Logging in…' : 'Log in' }}
        </button>

        <p class="system-mobile">Admin Control System</p>

      </form>

    </div>
  </div>

</div>
