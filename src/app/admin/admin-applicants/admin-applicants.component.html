<div class="dashboard-wrapper">

  <!-- SIDENAV -->
  <app-admin-sidenav></app-admin-sidenav>

  <!-- MAIN -->
  <div class="main-section">

    <!-- TOP NAV -->
    <app-admin-topnav></app-admin-topnav>

    <!-- CONTENT -->
    <div class="dashboard-content">

      <!-- HEADER -->
      <div class="dashboard-header header-flex">

        <div>
          <h2>Intern Applicants</h2>
        </div>

        <!-- RIGHT SIDE -->
        <div class="header-actions">

          <!-- STATUS FILTER (First) -->
          <select class="status-filter" (change)="filterStatus($event)">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="declined">Declined</option>
          </select>

          <!-- SEARCH (Second) -->
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input 
              type="text" 
              placeholder="Search applicant..."
              (input)="onSearch($event)"
            >
          </div>

        </div>

      </div>

      <!-- DIVIDER -->
      <div class="dashboard-divider"></div>

      <!-- TABLE -->
      <div class="center-wrapper">
        <div class="table-container">
          <table class="applicants-table">

            <thead>
              <tr>
                <th>Name</th>
                <th>Student ID</th>
                <th>Course</th>
                <th>Email</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let applicant of filteredApplicants" (click)="openModal(applicant)">
                
                <td class="profile-name">
                  <img src="assets/images/profile.png" class="profile-pic">
                  <span>{{ applicant.name }}</span>
                </td>

                <td>{{ applicant.studentId }}</td>
                <td>{{ applicant.course }}</td>
                <td>{{ applicant.email }}</td>

                <td>
                  <span class="status-badge">
                    {{ applicant.status }}
                  </span>
                </td>

                <td class="actions">
                  <button class="accept-btn">Approve</button>
                  <button class="decline-btn">Decline</button>
                </td>

              </tr>
            </tbody>

          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="selectedApplicant" (click)="closeModal()">
  <div class="modal-content modern-modal" (click)="$event.stopPropagation()">

    <div class="profile-section">
      <div class="profile-circle"></div>
    </div>

    <!-- PERSONAL -->
    <div class="form-section">
      <div class="section-header">Personal Information</div>

      <div class="form-row">
        <input [value]="selectedApplicant.firstName" readonly>
        <input [value]="selectedApplicant.middleName" readonly>
        <input [value]="selectedApplicant.lastName" readonly>
      </div>

      <input [value]="selectedApplicant.contact" readonly>
      <input [value]="selectedApplicant.email" readonly>

      <div class="form-row">
        <input [value]="selectedApplicant.birthday" readonly>
        <input [value]="selectedApplicant.gender" readonly>
      </div>

      <input [value]="selectedApplicant.address" readonly>
    </div>

    <!-- ACADEMIC -->
    <div class="form-section">
      <div class="section-header">Academic Background</div>

      <input [value]="selectedApplicant.studentId" readonly>
      <input [value]="selectedApplicant.school" readonly>
      <input [value]="selectedApplicant.course" readonly>
      <input [value]="selectedApplicant.yearLevel" readonly>
    </div>

    <!-- DOCUMENTS -->
    <div class="form-section">
      <div class="section-header">Required Documents</div>

      <div class="file-box">
        <label>Resume / CV</label>
        <div class="file-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <i class="fa-solid fa-download"></i>
        </div>
        <input type="file">
      </div>

      <div class="file-box">
        <label>Endorsement Letter</label>
        <div class="file-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <i class="fa-solid fa-download"></i>
        </div>
        <input type="file">
      </div>

      <div class="file-box">
        <label>Certificate of Enrollment</label>
        <div class="file-icons">
          <i class="fa-solid fa-magnifying-glass"></i>
          <i class="fa-solid fa-download"></i>
        </div>
        <input type="file">
      </div>

      <!-- MODAL ACTION BUTTONS -->
      <div class="modal-actions">
        <button class="accept-btn">Approve</button>
        <button class="decline-btn">Decline</button>
      </div>

    </div>

  </div>
</div>
