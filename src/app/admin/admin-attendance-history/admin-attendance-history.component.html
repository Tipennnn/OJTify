<!-- Fixed Top Nav -->
<div class="profile-top-nav">
  <button class="back-btn">
    <i class="fa-solid fa-arrow-left"></i>

</div>

<div class="dashboard-content">

  <!-- Header with Attendance + Date + Search -->
  <div class="center-wrapper">
    <div class="dashboard-header">
      <div class="header-left">
        <h2>Attendance History</h2>

        <!-- Styled clickable date box -->

          <i class="fa-solid fa-calendar-days"></i>
          <span>March 22, 2026</span>
          <input type="date" value="2026-03-22">
        </label>
      </div>

      <div class="header-right">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search intern...">
        </div>
      </div>
    </div>
  </div>

        </thead>
        <tbody>

              <img src="https://ui-avatars.com/api/?name=Juan+Dela+Cruz&background=2563eb&color=fff&size=64" class="profile-pic" alt="Profile">
              <span>Juan Dela Cruz</span>
            </td>
            <td>2023-001</td>
            <td>08:00 AM</td>
            <td>05:00 PM</td>
            <td><span class="status-badge badge-approved">Present</span></td>
          </tr>
          <tr>
            <td class="profile-name">
              <img src="https://ui-avatars.com/api/?name=Maria+Santos&background=2563eb&color=fff&size=64" class="profile-pic" alt="Profile">

            </td>
            <td>2023-002</td>
            <td>08:15 AM</td>
            <td>05:00 PM</td>
            <td><span class="status-badge badge-approved">Present</span></td>
          </tr>
          <tr>
            <td class="profile-name">
              <img src="https://ui-avatars.com/api/?name=Pedro+Reyes&background=2563eb&color=fff&size=64" class="profile-pic" alt="Profile">
              <span>Pedro Reyes</span>

      </table>

      <!-- Pagination -->
      <div class="pagination">
        <button class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="page-numbers">
          <span class="page active">1</span>
          <span class="page">2</span>
          <span class="page">3</span>
        </div>
        <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
      </div>

    </div>
  </div>
