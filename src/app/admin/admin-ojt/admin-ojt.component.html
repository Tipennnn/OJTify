<div class="dashboard-wrapper">

  <app-admin-sidenav></app-admin-sidenav>

  <div class="main-section">
    <app-admin-topnav></app-admin-topnav>

    <div class="dashboard-content">

      <div class="dashboard-header header-flex">
        <div><h2>OJT Interns</h2></div>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search intern..."
                 (input)="onSearch($event)">
        </div>
      </div>

      <div class="dashboard-divider"></div>

      <!-- Loading -->
      <div *ngIf="loading"
           style="text-align:center; padding:40px; color:#9ca3af;">
        <i class="fa fa-spinner fa-spin" style="font-size:28px;"></i>
        <p style="margin-top:12px;">Loading interns...</p>
      </div>

      <div class="center-wrapper" *ngIf="!loading">
        <div class="table-container">
          <table class="applicants-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Student ID</th>
                <th>Course</th>
               <!--- <th>School</th>----->
                <th>Email</th>
                <th>OJT Start Date</th>
                <th>Hours Progress</th>
              </tr>
            </thead>
            <tbody>

              <tr *ngFor="let student of filteredStudents">
                <td class="profile-name">
                  <img [src]="student.profile_photo_id
                              ? getPhotoUrl(student.profile_photo_id)
                              : 'assets/images/default-profile.png'"
                       class="profile-pic"
                       alt="Profile">
                  <span>{{ getFullName(student) }}</span>
                </td>
                <td>{{ student.student_id }}</td>
                <td>{{ student.course }}</td>
                <!--<td>{{ student.school_name }}</td>-->
                <td>{{ student.email }}</td>
                <td>{{ getStartDate(student) }}</td>
                <td>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%;"></div>
                  </div>
                  <span class="progress-text">0% (No attendance yet)</span>
                </td>
              </tr>

              <!-- Empty state -->
              <tr *ngIf="filteredStudents.length === 0">
                <td colspan="7"
                    style="text-align:center; color:#9ca3af; padding:30px;">
                  No interns found.
                </td>
              </tr>

            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
