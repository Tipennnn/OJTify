<div class="login-wrapper">

  <div class="login-left">
    <div class="bg-pattern"></div>
    <div class="login-left-content">
      <div class="brand hide-mobile">
        <img src="/assets/images/OJTify_logo.png">
        <span>OJTIFY</span>
      </div>
      <div class="welcome-text hide-mobile">
        <h1>Reset Your Password</h1>
        <p>Enter your new password below to regain access to your OJTify account.</p>
      </div>
      <div class="system-info hide-mobile">
        <span>OJTIFY System v1.0</span>
        <span>OJT Management System with QR Attendance</span>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">

      <h2>Set New Password</h2>
      <p style="font-size:13px; color:#6b7280; margin-bottom:20px;">
        Enter and confirm your new password below.
      </p>

      <div class="alert-error" *ngIf="errorMessage">
        <i class="fa fa-circle-exclamation"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="onResetPassword()" *ngIf="validLink">

        <div class="input-group">
          <div class="input-wrapper">
            <span class="icon"><i class="fa fa-lock"></i></span>
            <input [type]="showNew ? 'text' : 'password'"
                   [(ngModel)]="newPassword"
                   name="newPassword"
                   placeholder=" "
                   required>
            <label>New Password</label>
            <span class="show-pass" (click)="showNew = !showNew">
              <i [class]="showNew ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
            </span>
          </div>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <span class="icon"><i class="fa fa-lock"></i></span>
            <input [type]="showConfirm ? 'text' : 'password'"
                   [(ngModel)]="confirmPassword"
                   name="confirmPassword"
                   placeholder=" "
                   required>
            <label>Confirm New Password</label>
            <span class="show-pass" (click)="showConfirm = !showConfirm">
              <i [class]="showConfirm ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
            </span>
          </div>
        </div>

        <button class="login-btn" type="submit" [disabled]="loading">
          <i class="fa fa-spinner fa-spin" *ngIf="loading"></i>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>

        <p class="signup-link">
          Remember your password?
          <a routerLink="/intern-login">Log in</a>
        </p>

      </form>

    </div>
  </div>
</div>
